repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest fast smoke
        entry: pytest tests/test_smoke.py -q
        language: system
        pass_filenames: false
        stages: [pre-push]
